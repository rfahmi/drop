<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --accent-color: #3b82f6;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --hover-bg: rgba(59, 130, 246, 0.1);
            --selected-bg: rgba(59, 130, 246, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #f9fafb;
                --card-bg: rgba(31, 41, 55, 0.7);
                --card-border: rgba(75, 85, 99, 0.5);
                --hover-bg: rgba(59, 130, 246, 0.2);
                --selected-bg: rgba(59, 130, 246, 0.4);
            }
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .container {
            flex: 1;
            padding: 0 40px 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .dropzone {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }

        .dropzone.dragover {
            border: 2px dashed var(--accent-color);
            background: var(--hover-bg);
        }

        .drag-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(59, 130, 246, 0.8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 10;
        }

        .dropzone.dragover .drag-overlay {
            opacity: 1;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            align-content: start;
        }

        .file-item {
            background: transparent;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            user-select: none;
        }

        .file-item:hover {
            background: var(--hover-bg);
        }

        .file-item.selected {
            background: var(--selected-bg);
        }

        .file-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            fill: var(--text-color);
        }

        .file-name {
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .file-size {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .loader {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid var(--accent-color);
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        #authModal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--bg-color);
            padding: 32px;
            border-radius: 16px;
            width: 300px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 16px 0;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .modal-content button {
            width: 100%;
            padding: 10px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }

        /* SVG icon */
        .icon-svg {
            width: 48px;
            height: 48px;
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div id="authModal" class="hidden">
        <div class="modal-content">
            <h2>Authentication</h2>
            <p>Please enter your access token.</p>
            <input type="password" id="tokenInput" placeholder="Token" onkeypress="if(event.key === 'Enter') saveToken()">
            <button onclick="saveToken()">Save</button>
        </div>
    </div>

    <header>
        <h1>Drop</h1>
        <div style="font-size: 14px; opacity: 0.7;">Drag files anywhere to upload</div>
    </header>

    <div class="container">
        <div id="dropzone" class="dropzone">
            <div class="drag-overlay">Drop files to upload</div>
            <div id="fileList" class="file-list"></div>
            <div id="loader" class="loader"></div>
        </div>
    </div>

    <script>
        const fileList = document.getElementById('fileList');
        const dropzone = document.getElementById('dropzone');
        const loader = document.getElementById('loader');
        const authModal = document.getElementById('authModal');
        const tokenInput = document.getElementById('tokenInput');

        let token = localStorage.getItem('authToken');

        if (!token) {
            authModal.classList.remove('hidden');
            tokenInput.focus();
        } else {
            loadFiles();
        }

        function saveToken() {
            token = tokenInput.value;
            localStorage.setItem('authToken', token);
            authModal.classList.add('hidden');
            loadFiles();
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function getFileIconSVG() {
            return `<svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                <polyline points="13 2 13 9 20 9"></polyline>
            </svg>`;
        }

        async function loadFiles() {
            loader.style.display = 'block';
            fileList.innerHTML = '';
            try {
                const res = await fetch('/api/files', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (res.status === 401) {
                    localStorage.removeItem('authToken');
                    token = null;
                    authModal.classList.remove('hidden');
                    return;
                }
                
                if (!res.ok) throw new Error('Failed to fetch');

                const data = await res.json();
                
                if (data === null || data.length === 0) {
                    fileList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; opacity: 0.5; padding: 40px;">No files found</div>';
                } else {
                    data.forEach(file => {
                        const el = document.createElement('div');
                        el.className = 'file-item';
                        el.innerHTML = `
                            ${getFileIconSVG()}
                            <div class="file-name" title="${file.name}">${file.name}</div>
                            <div class="file-size">${formatBytes(file.size)}</div>
                        `;
                        
                        el.onclick = (e) => {
                            document.querySelectorAll('.file-item').forEach(i => i.classList.remove('selected'));
                            el.classList.add('selected');
                        };
                        
                        el.ondblclick = () => {
                            window.location.href = `/api/files/${encodeURIComponent(file.name)}?token=${encodeURIComponent(token)}`;
                        };
                        
                        fileList.appendChild(el);
                    });
                }
            } catch (err) {
                console.error('Failed to load files', err);
                if(token) alert('Failed to load files. Check console.');
            } finally {
                loader.style.display = 'none';
            }
        }

        // Drag and Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        let dragCounter = 0;

        document.body.addEventListener('dragenter', (e) => {
            dragCounter++;
            dropzone.classList.add('dragover');
        }, false);

        document.body.addEventListener('dragleave', (e) => {
            dragCounter--;
            if (dragCounter === 0) {
                dropzone.classList.remove('dragover');
            }
        }, false);

        document.body.addEventListener('drop', handleDrop, false);

        async function handleDrop(e) {
            dragCounter = 0;
            dropzone.classList.remove('dragover');
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0) {
                loader.style.display = 'block';
                for (let i = 0; i < files.length; i++) {
                    await uploadFile(files[i]);
                }
                loader.style.display = 'none';
                loadFiles();
            }
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch('/api/files', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                if (!res.ok) {
                    const text = await res.text();
                    console.error('Upload failed', text);
                    alert('Upload failed: ' + text);
                }
            } catch (err) {
                console.error('Upload failed', err);
                alert('Upload failed: ' + err.message);
            }
        }
    </script>
</body>
</html>
