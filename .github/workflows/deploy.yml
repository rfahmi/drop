name: Build, Release, and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/drop
  SERVICE_NAME: drop-service
  REGION: us-central1

jobs:
  build-release-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binaries for Release
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-w -s" -o drop-windows-amd64.exe .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-w -s" -o drop-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s" -o drop-darwin-arm64 .
          GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o drop-linux-amd64 .

      - name: Create Release and Upload Binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') # Only create true releases for git tags (e.g. v1.0.0)
        with:
          files: |
            drop-windows-amd64.exe
            drop-darwin-amd64
            drop-darwin-arm64
            drop-linux-amd64

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.IMAGE_NAME }}:latest

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --max-instances=1
            --min-instances=0
            --cpu=1
            --memory=128Mi
            --concurrency=80
            --execution-environment=gen1
          env_vars: |
            AUTH_TOKEN=${{ secrets.AUTH_TOKEN }}
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}

      - name: Show Output
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
